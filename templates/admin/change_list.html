{% extends "admin/change_list.html" %}
{% block content_title %}
    <h1> Quản lý Đơn hàng </h1>
    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px;">
        <div style="background: white; padding: 10px 20px; border: 1px solid #ddd; border-left: 5px solid #28a745;">
            <small>Doanh thu (Đã hoàn thành)</small><br>
            <strong style="font-size: 1.2rem; color: #28a745;">{{ total_revenue }} đ</strong>
        </div>
        <div style="background: white; padding: 10px 20px; border: 1px solid #ddd; border-left: 5px solid #007bff;">
            <small>Đơn hoàn thành</small><br>
            <strong style="font-size: 1.2rem; color: #007bff;">{{ completed_orders }}</strong>
        </div>
        <div style="background: white; padding: 10px 20px; border: 1px solid #ddd; border-left: 5px solid #ffc107;">
            <small>Đơn chờ xử lý</small><br>
            <strong style="font-size: 1.2rem; color: #ffc107;">{{ pending_orders }}</strong>
        </div>
    </div>
    {{ block.super }}
{% endblock %}
