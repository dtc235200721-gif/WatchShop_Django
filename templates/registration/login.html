{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow p-4 border-0">
                <h2 class="text-center mb-4">Đăng nhập</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 fw-bold">VÀO HỆ THỐNG</button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none small text-muted">Bạn quên mật khẩu?</a>
                </div>
                
                <div class="mt-2 text-center">
                    <span class="small">Chưa có tài khoản? <a href="{% url 'register' %}" class="text-decoration-none">Đăng ký ngay</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
