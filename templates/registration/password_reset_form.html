{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 dark-form p-4 text-white" style="background: #1a1a1a; border-radius: 10px;">
            <h2 class="text-center mb-4">Lấy lại mật khẩu</h2>
            <p>Nhập email bạn đã đăng ký, hệ thống sẽ gửi link đặt lại mật khẩu cho bạn.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Gửi yêu cầu</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
